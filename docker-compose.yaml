services:

  #  KRaft : Kafka sans Zookeeper (depuis Kafka 3.3 / CP 7.4+)
  broker:
    image: confluentinc/cp-kafka:7.6.1
    container_name: bddc-kafka-broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker:29093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 24
      #  CLUSTER_ID obligatoire en mode KRaft (UUID base64url sans padding)
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    volumes:
      - kafka_data:/var/lib/kafka/data

  #  UI de monitoring Kafka (très apprécié en entretien)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      broker:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kraft
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker:29092
    restart: unless-stopped

  backend:
    build:
      context: ./spring-kafka
    container_name: spring-backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=broker:29092
      - SPRING_CLOUD_STREAM_KAFKA_STREAMS_BINDER_BROKERS=broker:29092
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      broker:
        condition: service_healthy
    restart: on-failure:5
    # Healthcheck via Spring Actuator
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
    container_name: react-ui
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  kafka_data:
    driver: local